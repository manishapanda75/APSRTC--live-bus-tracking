<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Dashboard - APSRTC Live</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="container mt-4 mb-5" style="max-width: 500px;">
        <div class="card-box">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="m-0 card-title"><i class="bi bi-person-badge-fill"></i> Driver</h3>
                <div>
                    <span class="badge bg-secondary me-2">{{ username }}</span>
                    <button class="btn btn-outline-danger btn-sm rounded-pill" onclick="logout()">Logout</button>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold small text-muted">SELECT SERVICE NUMBER</label>
                <select id="serviceSelect" class="form-select form-select-lg">
                    <option value="28A">28A (Gajuwaka - Beach Road)</option>
                    <option value="6K">6K (Maddilapalem - Simhachalam)</option>
                    <option value="400K">400K (RTC Complex - Railway Stn)</option>
                </select>
            </div>

            <div class="d-grid gap-3">
                <button id="startBtn" class="btn btn-success btn-lg shadow-sm">
                    <i class="bi bi-broadcast"></i> Start Sharing
                </button>
                <button id="stopBtn" class="btn btn-danger btn-lg" style="display: none;">
                    <i class="bi bi-stop-circle"></i> Stop Sharing
                </button>
            </div>

            <!-- Status Indicator -->
            <div id="statusContainer" class="mt-4 p-3 rounded-3 text-center bg-light">
                <div class="small text-muted mb-1">STATUS</div>
                <div class="fw-bold fs-5 status-text">Inactive ⚪</div>
            </div>

            <div id="debugLog" class="mt-3 small text-muted font-monospace"
                style="height: 120px; overflow-y: auto; background: #eee; padding: 10px; border-radius: 8px;">
                Logs will appear here...
            </div>
        </div>
    </div>

    <script>
        // ─────────────────────────────────────────────
        // STATE
        // ─────────────────────────────────────────────
        let watchId        = null;   // watchPosition handle
        let wakeLock       = null;   // Screen Wake Lock handle
        let heartbeatTimer = null;   // Freeze-detection timer
        let activeService  = null;   // Currently shared service number
        let lastCoords     = null;   // Last known {lat,lng} — used for freeze detection
        let offlineQueue   = [];     // Updates buffered during network drops
        let isTracking     = false;

        const startBtn        = document.getElementById("startBtn");
        const stopBtn         = document.getElementById("stopBtn");
        const serviceSelect   = document.getElementById("serviceSelect");
        const statusContainer = document.getElementById("statusContainer");
        const debugLog        = document.getElementById("debugLog");

        // ─────────────────────────────────────────────
        // GPS OPTIONS
        // maximumAge:0  — never serve a cached position
        // timeout:8000  — fail fast; watchPosition will immediately retry
        // ─────────────────────────────────────────────
        const GPS_OPTIONS = {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 5000
        };

        // ─────────────────────────────────────────────
        // LOGGING
        // ─────────────────────────────────────────────
        function log(msg) {
            const time = new Date().toLocaleTimeString();
            const div  = document.createElement("div");
            div.innerHTML = `<span style="color:#888;">[${time}]</span> ${msg}`;
            debugLog.insertBefore(div, debugLog.firstChild);
            if (debugLog.children.length > 60) debugLog.removeChild(debugLog.lastChild);
        }

        // ─────────────────────────────────────────────
        // SCREEN WAKE LOCK — keeps display on while tracking
        // ─────────────────────────────────────────────
        async function acquireWakeLock() {
            if (!('wakeLock' in navigator)) {
                log("ℹ️ Wake Lock API not supported on this browser.");
                return;
            }
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                log("🔆 Wake Lock acquired — screen will stay on.");
                wakeLock.addEventListener('release', () => {
                    log("💤 Wake Lock released by system (screen off / tab hidden).");
                    wakeLock = null;
                });
            } catch (err) {
                log(`⚠️ Wake Lock failed: ${err.message}`);
            }
        }

        async function releaseWakeLock() {
            if (wakeLock) {
                await wakeLock.release().catch(() => {});
                wakeLock = null;
            }
        }

        // ─────────────────────────────────────────────
        // GPS SUCCESS CALLBACK
        // ─────────────────────────────────────────────
        function onLocationSuccess(pos) {
            const { latitude, longitude, speed } = pos.coords;
            const speedKmph = speed ? (speed * 3.6).toFixed(1) : 0;

            lastCoords = { lat: latitude, lng: longitude };
            resetHeartbeat();   // GPS is alive — reset freeze timer

            updateBackend(activeService, latitude, longitude, speedKmph);
            setStatus(`Live 🟢 <br><small>Sharing for ${activeService}</small>`, true);
        }

        // ─────────────────────────────────────────────
        // GPS ERROR CALLBACK
        // ─────────────────────────────────────────────
        function onLocationError(err) {
            console.error(err);
            log(`⚠️ GPS Error (code ${err.code}): ${err.message}`);

            if (err.code === 1) {
                // PERMISSION_DENIED — nothing we can do, stop
                alert("Please allow Location Access to share live tracking.");
                stopTracking();
            } else if (err.code === 3) {
                // TIMEOUT — watchPosition will retry automatically.
                // Meanwhile send last known coords to keep backend alive.
                log("⏱️ GPS timeout — watchPosition retrying...");
                if (lastCoords) {
                    log("📍 Sending last known position as keepalive...");
                    updateBackend(activeService, lastCoords.lat, lastCoords.lng, 0);
                }
            }
            // err.code 2 = POSITION_UNAVAILABLE — watchPosition retries on its own
        }

        // ─────────────────────────────────────────────
        // HEARTBEAT — restarts GPS if no fix for 10 seconds
        // ─────────────────────────────────────────────
        function resetHeartbeat() {
            clearTimeout(heartbeatTimer);
            heartbeatTimer = setTimeout(() => {
                if (!isTracking) return;
                log("💓 Heartbeat: no GPS fix for 35 s — reinitialising watchPosition...");
                restartWatch();
            }, 35000);
        }

        function restartWatch() {
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            // Immediate single fix then continuous watch
            navigator.geolocation.getCurrentPosition(onLocationSuccess, onLocationError, GPS_OPTIONS);
            watchId = navigator.geolocation.watchPosition(onLocationSuccess, onLocationError, GPS_OPTIONS);
            log("🔄 watchPosition restarted.");
        }

        // ─────────────────────────────────────────────
        // VISIBILITY CHANGE — resume when driver returns to tab/app
        // ─────────────────────────────────────────────
        document.addEventListener("visibilitychange", async () => {
            if (!isTracking) return;
            if (document.visibilityState === "hidden") {
                log("📱 App moved to background — GPS continues via watchPosition...");
            } else {
                log("👁️ App returned to foreground — refreshing GPS & Wake Lock...");
                await acquireWakeLock();   // Re-acquire (OS may have released it)
                restartWatch();            // Force a fresh GPS fix immediately
            }
        });

        // ─────────────────────────────────────────────
        // START TRACKING
        // ─────────────────────────────────────────────
        startBtn.addEventListener("click", async () => {
            const serviceNo = serviceSelect.value;
            if (!serviceNo) { alert("Please select a service number first."); return; }
            if (!navigator.geolocation) { alert("Geolocation is not supported by your browser."); return; }

            activeService = serviceNo;
            isTracking    = true;
            lastCoords    = null;

            startBtn.style.display  = "none";
            stopBtn.style.display   = "block";
            serviceSelect.disabled  = true;

            setStatus("Connecting GPS... 🛰️", true);
            log("Requesting GPS access...");

            await acquireWakeLock();

            // Immediate single fix + then continuous watch
            navigator.geolocation.getCurrentPosition(onLocationSuccess, onLocationError, GPS_OPTIONS);
            watchId = navigator.geolocation.watchPosition(onLocationSuccess, onLocationError, GPS_OPTIONS);
            resetHeartbeat();
        });

        // ─────────────────────────────────────────────
        // STOP TRACKING
        // ─────────────────────────────────────────────
        stopBtn.addEventListener("click", () => stopTracking());

        function stopTracking() {
            isTracking    = false;
            activeService = null;
            lastCoords    = null;

            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            clearTimeout(heartbeatTimer);
            releaseWakeLock();

            stopBtn.style.display   = "none";
            startBtn.style.display  = "block";
            serviceSelect.disabled  = false;

            setStatus("Inactive ⚪", false);
            log("Stopped tracking.");
        }

        // ─────────────────────────────────────────────
        // UI HELPER
        // ─────────────────────────────────────────────
        function setStatus(html, active) {
            statusContainer.querySelector(".status-text").innerHTML = html;
            if (active) {
                statusContainer.classList.add("status-active", "pulse");
                statusContainer.classList.remove("status-error");
            } else {
                statusContainer.classList.remove("status-active", "pulse", "status-error");
            }
        }

        // ─────────────────────────────────────────────
        // BACKEND UPDATE — offline queue + exponential backoff
        // ─────────────────────────────────────────────
        const MAX_RETRIES = 5;
        let flushPending  = false;

        async function updateBackend(serviceNo, lat, lng, speed, attempt = 0) {
            const payload = { service_no: serviceNo, lat, lng, speed };

            try {
                const response = await fetch('/api/update_location', {
                    method:    'POST',
                    headers:   { 'Content-Type': 'application/json' },
                    body:      JSON.stringify(payload),
                    keepalive: true   // survives page unload / background
                });

                if (response.ok) {
                    log(`✅ Sent: ${lat.toFixed(5)}, ${lng.toFixed(5)} (${speed} km/h)`);
                    setStatus(`Live 🟢 <br><small>Sharing for ${serviceNo}</small>`, true);
                    flushOfflineQueue();   // Connection is back — flush queued items
                    return;
                }

                // Server-side error (5xx) — retry with backoff
                const errData = await response.json().catch(() => ({}));
                log(`❌ Server error: ${errData.error || 'HTTP ' + response.status}`);

                if (response.status >= 500 && attempt < MAX_RETRIES) {
                    scheduleRetry(serviceNo, lat, lng, speed, attempt);
                } else {
                    queueOffline(payload);
                }

            } catch (netErr) {
                // Network failure — offline or signal drop
                log(`📵 Network error (attempt ${attempt + 1}): ${netErr.message}`);
                setStatus(`No Signal 🔴 <br><small>Retrying...</small>`, false);
                statusContainer.classList.add("status-error");

                if (attempt < MAX_RETRIES) {
                    scheduleRetry(serviceNo, lat, lng, speed, attempt);
                } else {
                    log("📦 Max retries reached — queuing update.");
                    queueOffline(payload);
                }
            }
        }

        function scheduleRetry(serviceNo, lat, lng, speed, attempt) {
            const delay = Math.min(Math.pow(2, attempt) * 1000, 30000); // cap at 30s
            log(`⏳ Retrying in ${delay / 1000}s... (${attempt + 1}/${MAX_RETRIES})`);
            setTimeout(() => updateBackend(serviceNo, lat, lng, speed, attempt + 1), delay);
        }

        // ─── Offline Queue ─────────────────────────────────────────
        function queueOffline(payload) {
            if (offlineQueue.length < 20) {   // cap to avoid memory bloat
                offlineQueue.push(payload);
                log(`📦 Queued (${offlineQueue.length} pending)`);
            }
        }

        async function flushOfflineQueue() {
            if (flushPending || offlineQueue.length === 0) return;
            flushPending = true;
            log(`📤 Flushing ${offlineQueue.length} queued update(s)...`);

            while (offlineQueue.length > 0) {
                const item = offlineQueue[0];
                try {
                    const r = await fetch('/api/update_location', {
                        method:    'POST',
                        headers:   { 'Content-Type': 'application/json' },
                        body:      JSON.stringify(item),
                        keepalive: true
                    });
                    if (r.ok) {
                        offlineQueue.shift();
                        log("✅ Flushed queued update.");
                    } else {
                        break;   // server still unhappy, stop flushing
                    }
                } catch {
                    break;       // still offline
                }
            }
            flushPending = false;
        }

        // Flush queue automatically when connectivity is restored
        window.addEventListener("online", () => {
            log("🌐 Network connection restored — flushing offline queue...");
            flushOfflineQueue();
        });

        // ─────────────────────────────────────────────
        // LOGOUT
        // ─────────────────────────────────────────────
        async function logout() {
            stopTracking();
            try {
                await fetch("/api/driver/logout", { method: "POST" });
                window.location.reload();
            } catch (e) { window.location.reload(); }
        }
    </script>
</body>

</html>
