<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — APSRTC Live Bus Tracker</title>
  <meta name="description" content="Login to track APSRTC buses live in Visakhapatnam.">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" href="/static/favicon.ico">
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <div class="login-logo-icon">🚌</div>
      <h2 data-i18n="welcomeBack">Welcome Back</h2>
      <p class="text-muted" data-i18n="loginSub">Login to track your bus live</p>
    </div>

    <!-- Lang switcher -->
    <div style="display:flex;justify-content:center;margin-bottom:1.5rem;">
      <div class="lang-switcher" style="background:#f3f4f6;">
        <button class="lang-btn active" style="color:var(--text-muted);" onclick="setLang('en')">EN</button>
        <button class="lang-btn" style="color:var(--text-muted);" onclick="setLang('te')">తె</button>
        <button class="lang-btn" style="color:var(--text-muted);" onclick="setLang('hi')">हि</button>
      </div>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
      <div style="display:flex;flex-direction:column;gap:1rem;">
        <div class="form-group">
          <label class="form-label" data-i18n="username" for="loginUser">Username</label>
          <input type="text" id="loginUser" class="form-control" placeholder="Enter your username" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="password" for="loginPass">Password</label>
          <div style="position:relative;">
            <input type="password" id="loginPass" class="form-control" placeholder="Enter your password" autocomplete="current-password" style="padding-right:3rem;" onkeydown="if(event.key==='Enter')handleLogin()">
            <button onclick="togglePass('loginPass', this)" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--text-muted);" id="loginEyeBtn">👁</button>
          </div>
        </div>
        <div class="form-check">
          <input type="checkbox" id="rememberMe">
          <label for="rememberMe" data-i18n="rememberMe">Remember me for 30 days</label>
        </div>
        <div class="captcha-container">
          <div class="g-recaptcha" data-sitekey="6LdgW7UsAAAAAD-J2vjS3aFXCC1d2irNpKObHpWN"></div>
        </div>
        <p class="captcha-error" id="login-captcha-error" style="color:var(--orange); display:none; font-size:0.875rem;" data-i18n="captcha_error">
          Please complete the CAPTCHA verification
        </p>
        <button class="btn btn-blue btn-block btn-lg" onclick="handleLogin()" data-i18n="login">Login</button>
      </div>
      <div class="text-center" style="margin-top:1rem;">
        <span style="color:var(--blue);cursor:pointer;font-size:0.875rem;font-weight:500;" onclick="toggleForms()" data-i18n="newUser">New user? Create Account</span>
      </div>
    </div>

    <!-- Register Form -->
    <div id="registerForm" class="hidden">
      <div style="display:flex;flex-direction:column;gap:1rem;">
        <div class="form-group">
          <label class="form-label" data-i18n="chooseUsername" for="regUser">Choose Username</label>
          <input type="text" id="regUser" class="form-control" placeholder="Pick a username" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="choosePassword" for="regPass">Create Password</label>
          <div style="position:relative;">
            <input type="password" id="regPass" class="form-control" placeholder="Create a strong password" style="padding-right:3rem;" autocomplete="new-password">
            <button onclick="togglePass('regPass', this)" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--text-muted);" id="regEyeBtn">👁</button>
          </div>
        </div>
        <button class="btn btn-primary btn-block btn-lg" onclick="handleRegister()" data-i18n="createAccount">Create Account</button>
      </div>
      <div class="text-center" style="margin-top:1rem;">
        <span style="color:var(--blue);cursor:pointer;font-size:0.875rem;font-weight:500;" onclick="toggleForms()" data-i18n="haveAccount">Already have an account? Login</span>
      </div>
    </div>

    <!-- Message Box -->
    <div id="messageBox" style="margin-top:1rem;"></div>

    <!-- Divider -->
    <div style="display:flex;align-items:center;gap:1rem;margin:1.5rem 0 0;">
      <hr style="flex:1;border:none;border-top:1px solid var(--border);">
      <span style="font-size:0.75rem;color:var(--text-muted);">OR</span>
      <hr style="flex:1;border:none;border-top:1px solid var(--border);">
    </div>
    <div style="margin-top:1rem;text-align:center;">
      <a href="/driver/login" class="btn btn-ghost btn-block" data-i18n="driverPortal">
        🚗 Driver Portal
      </a>
    </di<script src="/static/js/translations.js"></script>
<script>
function togglePass(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

function showMsg(msg, type) {
  document.getElementById('messageBox').innerHTML = `<div class="alert alert-${type === 'danger' ? 'error' : type}">${msg}</div>`;
}

function toggleForms() {
  document.getElementById('loginForm').classList.toggle('hidden');
  document.getElementById('registerForm').classList.toggle('hidden');
  document.getElementById('messageBox').innerHTML = '';
}

async function handleLogin() {
  const user     = document.getElementById('loginUser').value.trim();
  const pass     = document.getElementById('loginPass').value;
  const remember = document.getElementById('rememberMe').checked;
  const lang     = localStorage.getItem('lang') || 'en';
  
  if (!user || !pass) return showMsg('Please fill all fields', 'error');

  const captchaResponse = grecaptcha.getResponse();
  if (!captchaResponse) {
    document.getElementById('login-captcha-error').style.display = 'block';
    return;
  }
  document.getElementById('login-captcha-error').style.display = 'none';

  const btn = document.querySelector('#loginForm .btn-blue');
  btn.disabled = true; btn.textContent = 'Logging in...';

  try {
    const res  = await fetch('/api/user/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass, remember, 'g-recaptcha-response': captchaResponse })
    });
    const data = await res.json();
    if (res.ok && data.redirect) {
      window.location.href = data.redirect;
    } else {
      showMsg(data.error || 'Login failed', 'error');
      btn.disabled = false; btn.textContent = translations[lang].login || 'Login';
    }
  } catch(e) {
    showMsg('Server error. Please try again.', 'error');
    btn.disabled = false; btn.textContent = translations[lang].login || 'Login';
  }
}

async function handleRegister() {
  const user = document.getElementById('regUser').value.trim();
  const pass = document.getElementById('regPass').value;
  const lang = localStorage.getItem('lang') || 'en';
  
  if (!user || !pass) return showMsg('Please fill all fields', 'error');
  if (pass.length < 6) return showMsg('Password must be at least 6 characters', 'error');

  const btn = document.querySelector('#registerForm .btn-primary');
  btn.disabled = true; btn.textContent = 'Creating...';

  try {
    const res  = await fetch('/api/user/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass })
    });
    const data = await res.json();
    if (res.ok) {
      showMsg(data.message, 'success');
      setTimeout(toggleForms, 1500);
    } else {
      showMsg(data.error || 'Registration failed', 'error');
    }
  } catch(e) { showMsg('Server error', 'error'); }

  btn.disabled = false; btn.textContent = translations[lang].create_account || 'Create Account';
}
</script>
</body>
</html>
