<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — APSRTC Live</title>
  <link rel="stylesheet" href="/static/style.css?v={{ v }}">
  <link rel="icon" href="/static/favicon.ico?v={{ v }}">
</head>
<body>

<div class="offline-page">
  <div class="offline-content">
    <span class="offline-icon">🚌</span>
    <h1 style="font-size:2rem;margin-bottom:0.5rem;">You're Offline</h1>
    <p style="opacity:0.85;margin-bottom:0.5rem;">No internet connection detected.</p>
    <p style="opacity:0.7;font-size:0.9rem;margin-bottom:2rem;">Connect to the internet to track APSRTC buses live in Visakhapatnam.</p>

    <div style="display:flex;flex-direction:column;gap:0.875rem;">
      <button onclick="window.location.reload()" class="btn btn-primary btn-lg" style="justify-content:center;">
        🔄 Try Again
      </button>
      <a href="/" class="btn btn-ghost btn-lg" style="color:#fff;border-color:rgba(255,255,255,0.3);justify-content:center;">
        🏠 Go Home
      </a>
    </div>

    <div style="margin-top:2.5rem;padding:1.25rem;background:rgba(255,255,255,0.08);border-radius:var(--radius);font-size:0.875rem;opacity:0.85;">
      <div style="font-weight:700;margin-bottom:0.5rem;">🚌 APSRTC Visakhapatnam</div>
      <div>RTC Complex → 10 Destinations</div>
      <div style="margin-top:0.25rem;opacity:0.7;">Check back when you're online for live schedules</div>
    </div>

    <div style="margin-top:1.5rem;opacity:0.5;font-size:0.75rem;">
      Andhra Pradesh State Road Transport Corporation
    </div>
  </div>
</div>

</body>
</html>
