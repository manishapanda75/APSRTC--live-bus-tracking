<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driver Login — APSRTC Live</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/js/translations.js"></script>
  <style>
    .login-logo-icon { background: linear-gradient(135deg, var(--orange) 0%, var(--orange-dark) 100%); }
  </style>
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <div class="login-logo-icon">🚗</div>
      <div class="lang-switcher" style="margin-bottom:1.5rem;justify-content:center;">
        <button class="lang-btn active" data-lang="en" onclick="applyLanguage('en')">EN</button>
        <button class="lang-btn" data-lang="te" onclick="applyLanguage('te')">తె</button>
        <button class="lang-btn" data-lang="hi" onclick="applyLanguage('hi')">हि</button>
      </div>
      <h2 data-i18n="driver_login">Driver Portal</h2>
      <p class="text-muted" data-i18n="driver_login_sub">Login with your driver credentials</p>
    </div>

    <div style="display:flex;flex-direction:column;gap:1rem;">
      <div class="form-group">
        <label class="form-label" data-i18n="username">Driver Username</label>
        <input type="text" id="driverUser" class="form-control" data-i18n-placeholder="username" placeholder="Enter driver username" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="password">Password</label>
        <div style="position:relative;">
          <input type="password" id="driverPass" class="form-control" data-i18n-placeholder="password" placeholder="Enter password" style="padding-right:3rem;" autocomplete="current-password" onkeydown="if(event.key==='Enter')handleDriverLogin()">
          <button onclick="togglePass()" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--text-muted);" id="eyeBtn">👁</button>
        </div>
      </div>
      <button class="btn btn-primary btn-block btn-lg" onclick="handleDriverLogin()" id="loginBtn" data-i18n="login">Login</button>
    </div>

    <div id="messageBox" style="margin-top:1rem;"></div>

    <div style="display:flex;align-items:center;gap:1rem;margin:1.5rem 0 0;">
      <hr style="flex:1;border:none;border-top:1px solid var(--border);">
      <span style="font-size:0.75rem;color:var(--text-muted);">OR</span>
      <hr style="flex:1;border:none;border-top:1px solid var(--border);">
    </div>
    <div style="margin-top:1rem;text-align:center;">
      <a href="/login" class="btn btn-ghost btn-block" data-i18n="passenger_login">👤 Passenger Login</a>
    </div>

    <!-- Info box -->
    <div class="alert alert-info" style="margin-top:1.25rem;font-size:0.8125rem;" data-i18n="driver_info_box">
      <span>🔒</span>
      <span>Driver accounts are created by admins only. Contact your supervisor if you cannot log in.</span>
    </div>

  </div>
</div>

<script>
function togglePass() {
  const inp = document.getElementById('driverPass');
  const btn = document.getElementById('eyeBtn');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

function showMsg(msg, type) {
  document.getElementById('messageBox').innerHTML = `<div class="alert alert-${type==='danger'?'error':type}">${msg}</div>`;
}

async function handleDriverLogin() {
  const user = document.getElementById('driverUser').value.trim();
  const pass = document.getElementById('driverPass').value;
  if (!user || !pass) return showMsg('Please fill all fields', 'error');

  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Logging in...';

  try {
    const res  = await fetch('/api/driver/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass })
    });
    const data = await res.json();
    if (res.ok && data.redirect) {
      window.location.href = data.redirect;
    } else {
      showMsg(data.error || 'Login failed', 'error');
      const lang = localStorage.getItem('lang') || 'en';
      btn.disabled = false; btn.textContent = translations[lang].login || 'Login';
    }
  } catch(e) {
    showMsg('Server error. Please try again.', 'error');
    const lang = localStorage.getItem('lang') || 'en';
    btn.disabled = false; btn.textContent = translations[lang].login || 'Login';
  }
}
</script>
</body>
</html>
