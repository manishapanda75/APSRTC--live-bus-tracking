<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driver Login — APSRTC Live</title>
  <link rel="stylesheet" href="/static/style.css?v={{ v }}">
  <link rel="icon" href="/static/favicon.ico?v={{ v }}">
  <script src="/static/js/translations.js?v={{ v }}"></script>
  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/static/service-worker.js').then(reg => reg.update());
    });
  }
  </script>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  <style>
    .login-logo-icon { background: linear-gradient(135deg, var(--orange) 0%, var(--orange-dark) 100%); }
    .driver-login-header { background: var(--blue-dark); padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; color: #fff; box-shadow: var(--shadow); }
  </style>
</head>
<body>

<header class="driver-login-header">
  <div style="display:flex;align-items:center;gap:0.75rem;">
    <div style="font-size:1.5rem;">🚌</div>
    <div style="font-weight:700;letter-spacing:0.5px;" data-i18n="app_title">APSRTC Live</div>
  </div>
  <div class="lang-switcher">
    <button class="lang-btn active" data-lang="en" onclick="applyLanguage('en')">EN</button>
    <button class="lang-btn" data-lang="te" onclick="applyLanguage('te')">తె</button>
    <button class="lang-btn" data-lang="hi" onclick="applyLanguage('hi')">हि</button>
  </div>
</header>

<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <div class="login-logo-icon">🚗</div>
      <h2 data-i18n="driver_portal" style="margin-top:1rem;">Driver Portal</h2>
      <p class="text-muted" data-i18n="driver_login_sub">Login with your driver credentials</p>
    </div>

    <div style="display:flex;flex-direction:column;gap:1.25rem;">
      <div class="form-group">
        <label class="form-label" data-i18n="driver_username_label" for="driverUser">DRIVER USERNAME</label>
        <input type="text" id="driverUser" class="form-control" data-i18n-placeholder="driver_username_placeholder" placeholder="Enter driver username" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="password_label" for="driverPass">PASSWORD</label>
        <div style="position:relative;">
          <input type="password" id="driverPass" class="form-control" data-i18n-placeholder="password_placeholder" placeholder="Enter password" style="padding-right:3rem;" autocomplete="current-password" onkeydown="if(event.key==='Enter')handleDriverLogin()">
          <button onclick="togglePass()" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--text-muted);" id="eyeBtn">👁</button>
        </div>
      </div>
      <div class="captcha-container">
        <div class="g-recaptcha" data-sitekey="6LdgW7UsAAAAAD-J2vjS3aFXCC1d2irNpKObHpWN"></div>
      </div>
      <p class="captcha-error" id="driver-captcha-error" style="color:var(--orange); display:none; font-size:0.875rem;" data-i18n="captcha_error">
        Please complete the CAPTCHA verification
      </p>
      <button class="btn btn-primary btn-block btn-lg" onclick="handleDriverLogin()" id="loginBtn" data-i18n="login_btn">Login</button>
    </div>

    <div id="messageBox" style="margin-top:1rem;"></div>

    <div style="display:flex;align-items:center;gap:1rem;margin:1.5rem 0 0;">
      <hr style="flex:1;border:none;border-top:1px solid var(--border);">
      <span style="font-size:0.75rem;color:var(--text-muted);" data-i18n="or_divider">OR</span>
      <hr style="flex:1;border:none;border-top:1px solid var(--border);">
    </div>
    <div style="margin-top:1.5rem;text-align:center;">
      <a href="/login" class="btn btn-ghost btn-block" data-i18n="passenger_login">👤 Passenger Login</a>
    </div>

    <!-- Info box -->
    <div class="alert alert-info" style="margin-top:1.5rem;font-size:0.875rem;" data-i18n="driver_note">
      Driver accounts are created by admins only. Contact your supervisor if you cannot log in.
    </div>

  </div>
</div>

<div id="toast-container" style="position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:0.5rem;pointer-events:none;"></div>

<script>
function togglePass() {
  const inp = document.getElementById('driverPass');
  const btn = document.getElementById('eyeBtn');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

function showMsg(msg, type) {
  document.getElementById('messageBox').innerHTML = `<div class="alert alert-${type==='danger'?'error':type}">${msg}</div>`;
}

async function handleDriverLogin() {
  const user = document.getElementById('driverUser').value.trim();
  const pass = document.getElementById('driverPass').value;
  const lang = localStorage.getItem('lang') || 'en';
  
  if (!user || !pass) {
    const errorMsg = lang === 'te' ? 'దయచేసి అన్ని వివరాలను పూరించండి' : 'Please fill all fields';
    return showMsg(errorMsg, 'error');
  }

  const captchaResponse = grecaptcha.getResponse();
  if (!captchaResponse) {
    document.getElementById('driver-captcha-error').style.display = 'block';
    return;
  }
  document.getElementById('driver-captcha-error').style.display = 'none';

  const btn = document.getElementById('loginBtn');
  btn.disabled = true; 
  btn.textContent = lang === 'te' ? 'లాగిన్ అవుతోంది...' : 'Logging in...';

  try {
    const res  = await fetch('/api/driver/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass, 'g-recaptcha-response': captchaResponse })
    });
    const data = await res.json();
    if (res.ok && data.redirect) {
      window.location.href = data.redirect;
    } else {
      showMsg(data.error || 'Login failed', 'error');
      btn.disabled = false; 
      btn.textContent = translations[lang].login_btn || 'Login';
    }
  } catch(e) {
    showMsg('Server error. Please try again.', 'error');
    btn.disabled = false; 
    btn.textContent = translations[lang].login_btn || 'Login';
  }
}
</script>
</body>
</html>
