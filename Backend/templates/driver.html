<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driver Dashboard — APSRTC Live</title>
  <link rel="stylesheet" href="/static/style.css?v={{ v }}">
  <link rel="icon" href="/static/favicon.ico?v={{ v }}">
  <script src="/static/js/translations.js?v={{ v }}"></script>
  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/static/service-worker.js').then(reg => reg.update());
    });
    let refreshing;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshing) return;
      refreshing = true;
      window.location.reload();
    });
  }
  </script>
  <style>
    body { background: var(--bg); }
    .driver-main { max-width: 680px; margin: 0 auto; padding: 1.5rem; }
    .location-card { background: #fff; border-radius: var(--radius-lg); padding: 1.75rem; box-shadow: var(--shadow); border: 1px solid var(--border); }
    .coord-box { background: var(--bg); border-radius: var(--radius); padding: 1rem; font-family: monospace; font-size: 0.9rem; color: var(--text-muted); text-align: center; min-height: 48px; display: flex; align-items: center; justify-content: center; }
    .status-indicator { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.875rem; font-weight: 600; }
    .dot-live  { width: 8px; height: 8px; border-radius: 50%; background: var(--success); animation: blink 1.2s infinite; }
    .dot-off   { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .log-box { background: #1a1a2e; color: #a8ff78; font-family: monospace; font-size: 0.8rem; border-radius: var(--radius); padding: 1rem; max-height: 200px; overflow-y: auto; }
  </style>
</head>
<body>

<!-- Header -->
<header class="app-header">
  <div class="header-logo">
    <div class="header-logo-icon" style="background:var(--orange);">🚗</div>
    <div><div data-i18n="driver_dashboard">Driver Dashboard</div><div class="header-subtitle" data-i18n="app_subtitle">APSRTC Live Tracker</div></div>
  </div>
  <div class="header-spacer"></div>
  <div class="header-clock" id="headerClock"></div>
  <div class="lang-switcher">
    <button class="lang-btn active" data-lang="en" onclick="applyLanguage('en')">EN</button>
    <button class="lang-btn" data-lang="te" onclick="applyLanguage('te')">తె</button>
    <button class="lang-btn" data-lang="hi" onclick="applyLanguage('hi')">हि</button>
  </div>
  <div style="display:flex;align-items:center;gap:0.75rem;">
    <span style="font-size:0.875rem;color:rgba(255,255,255,0.8);">🚗 {{ username }}</span>
    <button class="btn btn-ghost btn-sm" style="color:#fff;border-color:rgba(255,255,255,0.3);" onclick="logout()" data-i18n="logout">Logout</button>
  </div>
</header>

<div class="driver-main" id="driverMain">

  <!-- Assigned Route Card -->
  <div class="driver-card" style="margin-bottom:1.25rem;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;">
      <div>
        <div style="font-size:0.85rem;opacity:0.75;margin-bottom:0.25rem;" data-i18n="assigned_service">Assigned Service</div>
        <div style="font-size:2rem;font-weight:800;" id="assignedServiceNo">—</div>
      </div>
      <div id="liveStatusBadge" class="status-indicator"><span class="dot-off"></span> <span data-i18n="offline">Offline</span></div>
    </div>
    <div id="assignedRoute" style="opacity:0.85;font-size:0.95rem;" data-i18n="loading">Loading your assignment...</div>
    <div style="margin-top:0.75rem;font-size:0.8rem;opacity:0.65;" id="lastUpdateTime"></div>
  </div>

  <!-- Location Broadcast Card -->
  <div class="location-card" style="margin-bottom:1.25rem;">
    <h3 style="margin-bottom:1rem;" data-i18n="location_broadcast">📍 Location Broadcast</h3>
    <div class="coord-box" id="coordDisplay" data-i18n="broadcast_prompt">Press the button below to start sharing your location</div>

    <div style="margin-top:1.25rem;display:flex;flex-wrap:wrap;gap:0.75rem;">
      <div style="flex:1 1 140px;">
        <label class="form-label" style="margin-bottom:0.3rem;" data-i18n="speed_kmh" for="speedInput">Speed (km/h)</label>
        <input type="number" id="speedInput" class="form-control" value="0" min="0" max="120" placeholder="0">
      </div>
      <div style="flex:1 1 180px;">
        <label class="form-label" style="margin-bottom:0.3rem;" data-i18n="service_override" for="serviceInput">Service Override</label>
        <input type="text" id="serviceInput" class="form-control" placeholder="Auto-filled">
      </div>
    </div>

    <div style="margin-top:1.25rem;display:flex;gap:0.75rem;flex-wrap:wrap;">
      <button class="location-btn" style="flex:1;" id="startBtn" onclick="startBroadcast()">
        <span data-i18n="start_broadcast">Start Broadcasting Location</span>
      </button>
      <button class="btn btn-ghost" style="flex:0 0 auto;" id="stopBtn" onclick="stopBroadcast()" disabled data-i18n="stop_btn">Stop</button>
    </div>

    <div style="margin-top:0.75rem;" id="broadcastStatus"></div>
  </div>

  <!-- Log -->
  <div class="location-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;">
      <h4 data-i18n="broadcast_log">📋 Broadcast Log</h4>
      <button class="btn btn-ghost btn-sm" onclick="clearLog()" data-i18n="clear">Clear</button>
    </div>
    <div class="log-box" id="logBox">Waiting for broadcast to start...</div>
  </div>

</div>

<div id="toast-container" style="position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:0.5rem;pointer-events:none;"></div>

<script>
// ── Session Auto Logout ────────────────────────────────
window.addEventListener('load', () => {
    if (!sessionStorage.getItem('tabOpen')) {
        sessionStorage.setItem('tabOpen', 'true');
    }
});

window.addEventListener('beforeunload', () => {
    navigator.sendBeacon('/api/logout-session');
});

// ── Clock ──────────────────────────────────────────────
function updateClock() {
  const now  = new Date();
  const time = now.toLocaleString('en-IN', { timeZone:'Asia/Kolkata', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
  const date = now.toLocaleString('en-IN', { timeZone:'Asia/Kolkata', weekday:'short', day:'2-digit', month:'short' });
  document.getElementById('headerClock').innerHTML = `<strong>${time} IST</strong><br>${date}`;
}
setInterval(updateClock, 1000); updateClock();

// ── Driver Info ────────────────────────────────────────
let assignedServiceNo = null;
async function loadDriverInfo() {
  try {
    const res  = await fetch('/api/driver/info');
    if (res.status === 401) { window.location.href = '/driver/login'; return; }
    const data = await res.json();
    const lang = localStorage.getItem('lang') || 'en';
    
    if (data.assigned_service) {
      assignedServiceNo = data.assigned_service.service_no;
      document.getElementById('assignedServiceNo').textContent = assignedServiceNo;
      document.getElementById('assignedRoute').textContent = data.assigned_service.route || 'Route details unavailable';
      document.getElementById('serviceInput').value = assignedServiceNo;
    } else {
      document.getElementById('assignedServiceNo').textContent = translations[lang].not_assigned || 'Unassigned';
      document.getElementById('assignedRoute').textContent = translations[lang].not_assigned || 'No service assigned. Contact admin.';
    }
  } catch(e) { addLog('Failed to load driver info: ' + e.message, 'error'); }
}

// ── Broadcast ──────────────────────────────────────────
let broadcastInterval = null;
let watchId = null;

function setLiveStatus(live) {
  const el = document.getElementById('liveStatusBadge');
  const lang = localStorage.getItem('lang') || 'en';
  el.innerHTML = live
    ? `<span class="dot-live"></span> ${translations[lang].live_broadcasting || 'Live Broadcasting'}`
    : `<span class="dot-off"></span> ${translations[lang].offline || 'Offline'}`;
  el.style.color = live ? 'var(--success)' : '';
}

async function sendLocation(lat, lng, speed) {
  const serviceNo = document.getElementById('serviceInput').value || assignedServiceNo;
  const lang = localStorage.getItem('lang') || 'en';
  if (!serviceNo) { addLog('No service number! Contact admin.', 'error'); return; }

  try {
    const res = await fetch('/api/update_location', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ service_no: serviceNo, lat, lng, speed: +speed })
    });
    const d = await res.json();
    const ist = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: false });
    if (res.ok) {
      const sentLabel = translations[lang].location_sent || "Location sent";
      addLog(`[${ist}] ✅ ${sentLabel}: ${lat.toFixed(5)}, ${lng.toFixed(5)} @ ${speed} km/h`);
      document.getElementById('coordDisplay').textContent = `📍 ${lat.toFixed(6)}, ${lng.toFixed(6)}`;
      const updatedLabel = translations[lang].last_update || "Last update";
      document.getElementById('lastUpdateTime').textContent = `${updatedLabel}: ${ist} IST`;
    } else {
      addLog(`[${ist}] ❌ Error: ${d.error}`, 'error');
    }
  } catch(e) { addLog('Network error: ' + e.message, 'error'); }
}

function startBroadcast() {
  if (!navigator.geolocation) { showToast('Geolocation not supported', 'error'); return; }
  const lang = localStorage.getItem('lang') || 'en';

  document.getElementById('startBtn').disabled = true;
  document.getElementById('startBtn').innerHTML = `📡 ${translations[lang].live_broadcasting || 'Broadcasting...'}`;
  document.getElementById('stopBtn').disabled = false;
  setLiveStatus(true);

  watchId = navigator.geolocation.watchPosition(
    pos => {
      const { latitude, longitude, speed } = pos.coords;
      const spd = speed ? Math.round(speed * 3.6) : +document.getElementById('speedInput').value || 0;
      sendLocation(latitude, longitude, spd);
    },
    err => addLog('GPS error: ' + err.message, 'error'),
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 5000 }
  );

  broadcastInterval = setInterval(() => {
    navigator.geolocation.getCurrentPosition(
      pos => {
        const spd = +document.getElementById('speedInput').value || 0;
        sendLocation(pos.coords.latitude, pos.coords.longitude, spd);
      },
      err => addLog('GPS: ' + err.message, 'error'),
      { enableHighAccuracy: true, timeout: 8000 }
    );
  }, 15000);
}

function stopBroadcast() {
  const lang = localStorage.getItem('lang') || 'en';
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  if (broadcastInterval) { clearInterval(broadcastInterval); broadcastInterval = null; }
  document.getElementById('startBtn').disabled = false;
  document.getElementById('startBtn').innerHTML = `📡 <span data-i18n="start_broadcast">${translations[lang].start_broadcast || 'Start Broadcasting Location'}</span>`;
  document.getElementById('stopBtn').disabled = true;
  setLiveStatus(false);
  const stopMsg = lang === 'te' ? 'బ్రాడ్‌కాస్ట్ ఆపివేయబడింది.' : 'Broadcast stopped.';
  addLog(stopMsg);
}

// ── Log ────────────────────────────────────────────────
function addLog(msg, type) {
  const box = document.getElementById('logBox');
  const line = document.createElement('div');
  line.textContent = msg;
  if (type === 'error') line.style.color = '#ff6b6b';
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}
function clearLog() { document.getElementById('logBox').innerHTML = ''; }

// ── Toast ──────────────────────────────────────────────
function showToast(msg, type='info') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  const container = document.getElementById('toast-container');
  if (container) container.appendChild(t);
  setTimeout(() => t.remove(), 3200);
}

async function logout() {
  await fetch('/api/driver/logout', { method: 'POST' });
  window.location.href = '/driver/login';
}

loadDriverInfo();
</script>
</body>
</html>
