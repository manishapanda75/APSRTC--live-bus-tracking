services:
  - type: web
    name: apsrtc-tracker
    runtime: python
    rootDir: .
    buildCommand: "pip install -r Backend/requirements.txt"
    startCommand: "gunicorn --chdir Backend backend:app --workers 2 --threads 2 --worker-class gthread --timeout 120"
    plan: free
    envVars:
      - key: FLASK_ENV
        value: production
      - key: ADMIN_PASSWORD
        value: admin123
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: apsrtc-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.10.13"

databases:
  - name: apsrtc-db
    plan: free
